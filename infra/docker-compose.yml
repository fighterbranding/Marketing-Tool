version: '3.9'

services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: marketing_tool_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-marketing}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-marketing_dev}
      POSTGRES_DB: ${POSTGRES_DB:-marketing_tool}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: marketing_tool_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
